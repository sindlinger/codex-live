# TMUX CONFIG MODERNA 2024
# Compatível com tmux 3.0+

# Prefix mais acessível (Ctrl+A ao invés de Ctrl+B)
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# QUALIDADE DE VIDA
set -g base-index 1              # Janelas começam em 1
setw -g pane-base-index 1       # Painéis começam em 1
set -g renumber-windows on      # Renumera janelas automaticamente
set -g history-limit 50000      # Histórico grande
set -sg escape-time 0           # Sem delay no ESC
set -g display-time 4000        # Mensagens ficam 4s
set -g status-interval 5        # Atualiza status a cada 5s

# MOUSE COMPLETO
set -g mouse on                 # Habilita mouse para tudo

# Copiar com mouse (arrastar seleciona, soltar copia)
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'select-pane -t=; copy-mode -e; send-keys -M'"
bind -n WheelDownPane select-pane -t= \; send-keys -M

# VISUAL MODERNO
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",*256col*:Tc"

# Status bar
set -g status-position bottom
set -g status-style 'bg=#1e1e2e fg=#cdd6f4'
set -g status-left '#[fg=#89b4fa,bold]  #S #[fg=#585b70]│'
set -g status-right '#{?@watch_pane,#[fg=#a6e3a1] WATCH-PANE ,}#{?@watch_popup_pane,#[fg=#f9e2af] WATCH-POPUP ,}#[fg=#585b70]│#[fg=#f9e2af] %H:%M #[fg=#585b70]│#[fg=#cba6f7]  #h '
set -g status-left-length 50
set -g status-right-length 50

# Janela ativa
setw -g window-status-current-style 'fg=#1e1e2e bg=#89b4fa bold'
setw -g window-status-current-format ' #I:#W#F '

# Janelas inativas
setw -g window-status-style 'fg=#bac2de'
setw -g window-status-format ' #I:#W#F '

# Bordas dos painéis
set -g pane-border-style 'fg=#313244'
set -g pane-active-border-style 'fg=#89b4fa'

# Mensagens
set -g message-style 'fg=#1e1e2e bg=#f9e2af bold'

# ATALHOS INTUITIVOS

# Dividir janelas (mais intuitivo)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Navegação Vim entre painéis
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Alt + setas para navegar (sem prefix)
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Redimensionar painéis
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Criar janelas/painéis no diretório atual
bind c new-window -c "#{pane_current_path}"

# Copiar/Colar melhorado (modo vi)
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Recarregar config
bind r source-file ~/.tmux.conf \; display-message "Config recarregada!"

# Popup rápido - tamanhos diferentes
bind Space display-popup -E -w 40% -h 40% -x 60% -y 0  # Canto superior direito 40%
bind P display-popup -E -w 80% -h 80%                  # Grande (P maiúsculo)
bind p display-popup -E -w 60% -h 60%                  # Médio centralizado

# EXTRAS ÚTEIS

# Sincronizar painéis (digitar em todos ao mesmo tempo)
bind S setw synchronize-panes \; display "Sincronização: #{?pane_synchronized,ON,OFF}!"

# Maximizar painel temporariamente
bind z resize-pane -Z

# Matar painel/janela sem confirmação
bind x kill-pane
bind X kill-window

# Monitorar atividade
setw -g monitor-activity on
set -g visual-activity off

# Mostrar diretório atual no título
set -g set-titles on
set -g set-titles-string '#h ❐ #S ● #I #W'

# Histórico de comandos maior
set -g history-file ~/.tmux_history
# =========================
# CODEX WORKSPACE (ESPECIAL)
# =========================
# Repo alvo padrão do Codex
set -g @codex_repo '/mnt/c/git/operpdf-textopsalign'
set -g @codex_live_home '/home/chanfle/codex-live'

# Prefix + C: abre sessão codex em outro terminal (não toma este terminal)
bind-key C run-shell '/home/chanfle/codex-live/bin/codex-live tmux --session codex_live --repo "#{@codex_repo}" --width 70% --height 55%'

# Prefix + V: abre watch em janela externa (persistente)
bind-key V run-shell '/home/chanfle/codex-live/bin/codex-live open current'

# Toggle popup do watch (rápido)
bind-key W run-shell -b 'cmd=$(tmux show -qv @codex_watch_cmd 2>/dev/null || true); [ -n "$cmd" ] && tmux display-popup -E -w 70% -h 55% "$cmd" >/dev/null 2>&1 || true'
bind-key -n F12 run-shell -b 'cmd=$(tmux show -qv @codex_watch_cmd 2>/dev/null || true); [ -n "$cmd" ] && tmux display-popup -E -w 70% -h 55% "$cmd" >/dev/null 2>&1 || true'

# Toggle pane estável do watch (mais confiável que popup)
bind-key w run-shell '/home/chanfle/codex-live/bin/codex-live watch current'
